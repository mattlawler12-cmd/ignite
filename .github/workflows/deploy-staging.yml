# Deploy to WP Engine staging + reseed content.
#
# Replaces the prior `wpengine/github-action-wpe-site-deploy@v3` flow because
# we now run the seed step inline over SSH after the rsync — the official action
# can't do that, and the seed log is exactly what we want visible in the
# Actions output.
#
# Requires the `WPE_SSH_KEY` repo secret. Set it to the contents of
# `~/Library/Application Support/Local/ssh/wpe-connect` (the private key
# generated by Local "Connect to Host" — the matching public key is already
# installed on WP Engine).
#
# `--exclude='exports/'` is intentional: local-only Claude Design exports
# don't belong on staging.

name: Deploy to WP Engine staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy theme + reseed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.WPE_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Rsync theme to staging
        run: |
          rsync -azv --delete \
            --exclude='.git' \
            --exclude='*.bak*' \
            --exclude='node_modules' \
            --exclude='exports/' \
            -e "ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_ed25519" \
            igniteiq/ \
            igniteiqstg@igniteiqstg.ssh.wpengine.net:sites/igniteiqstg/wp-content/themes/igniteiq-v2/

      - name: Reseed content
        run: |
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_ed25519 \
            igniteiqstg@igniteiqstg.ssh.wpengine.net \
            'cd sites/igniteiqstg && wp igniteiq seed --force'

      - name: Flush WP Engine page cache
        run: |
          # WPE serves cached HTML by default; without this, post-deploy verify
          # and any visitor sees stale content for several minutes after a seed.
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_ed25519 \
            igniteiqstg@igniteiqstg.ssh.wpengine.net \
            'cd sites/igniteiqstg && wp page-cache flush'

      - name: Verify staging URLs
        run: |
          set +e
          fail=0
          for path in / /how-it-works/ /ontology/ /company/ /contact/ /signin/; do
            code=$(curl -o /dev/null -s -w "%{http_code}" -L "https://igniteiqstg.wpenginepowered.com${path}")
            echo "${code}  ${path}"
            if [ "$code" != "200" ]; then
              echo "::error::Staging URL ${path} returned $code"
              fail=1
            fi
          done
          exit ${fail:-0}
